function AuthScreen({onLogin}){
  const [mode,setMode]=useState("signin");
  const [uname,setUname]=useState("");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [pw2,setPw2]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const [showPw,setShowPw]=useState(false);
  const reset=()=>{setErr("");setUname("");setEmail("");setPw("");setPw2("");};
  const sw=m=>{setMode(m);reset();};
  const go=async()=>{
    setErr("");
    if(!email.trim()||!pw.trim()){setErr("이메일과 비밀번호를 입력해주세요.");return;}
    if(!email.includes("@")){setErr("올바른 이메일을 입력해주세요.");return;}
    setBusy(true);
    try{
        if(mode==="signup"){
        if(!uname.trim()){setErr("이름을 입력해주세요.");setBusy(false);return;}
        if(pw.length<6){setErr("비밀번호 6자 이상이어야 합니다.");setBusy(false);return;}
        if(pw!==pw2){setErr("비밀번호가 일치하지 않습니다.");setBusy(false);return;}
        const {data,error}=await sb.auth.signUp({email:email.trim(),password:pw,options:{data:{name:uname.trim()}}});
        if(error){setErr(error.message.includes("already")?"이미 사용 중인 이메일입니다.":error.message);setBusy(false);return;}
        onLogin({uid:data.user.id,name:uname.trim(),email:data.user.email});
      }else{
        const {data,error}=await sb.auth.signInWithPassword({email:email.trim(),password:pw});
        if(error){setErr("이메일 또는 비밀번호가 틀렸습니다.");setBusy(false);return;}
        const name=data.user.user_metadata?.name||data.user.email.split("@")[0];

      <div style={{width:"min(420px,100%)",background:"#141d2e",border:"1px solid #1e2d4a",borderRadius:20,padding:32,boxShadow:"0 32px 80px #00000070"}}>

          <div style={{fontSize:10,color:"#5a7a9e",fontWeight:700,letterSpacing:3,marginBottom:6}}>UA CREATIVE DASHBOARD</div>
          <div style={{fontSize:20,fontWeight:900,color:"#e8f0fe"}}>{mode==="signup"?"팀 계정 만들기":"로그인"}</div>
        </div>
        <div style={{display:"flex",background:"#080c15",borderRadius:10,padding:3,marginBottom:22,border:"1px solid #1e2d4a"}}>
          {[["signin","로그인"],["signup","회원가입"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);reset();}} style={{flex:1,padding:"8px",borderRadius:7,cursor:"pointer",background:mode===m?"#141d2e":"transparent",border:"1px solid "+(mode===m?"#2a3d5e":"transparent"),color:mode===m?"#e8f0fe":"#5a7a9e",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>{l}</button>

function App(){
  const [isDark,setIsDark]=useState(()=>localStorage.getItem("ua_theme")!=="light");
  C=makeC(isDark);applyTheme(isDark);
  const toggleTheme=()=>{setIsDark(d=>{const n=!d;localStorage.setItem("ua_theme",n?"dark":"light");C=makeC(n);applyTheme(n);return n;});};
  const [session,setSession]=useState(null);
  const [loading,setLoading]=useState(true);
  const [projects,setProjectsRaw]=useState([]);
  const [activeId,setActiveIdRaw]=useState(null);
  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session:s}})=>{
      if(s){
        const name=s.user.user_metadata?.name||s.user.email.split("@")[0];
        setSession({uid:s.user.id,name,email:s.user.email});
        const saved=await dbLoad(s.user.id);
        if(saved?.projects?.length>0){setProjectsRaw(saved.projects);setActiveIdRaw(saved.activeId);}
        else setProjectsRaw([mkProject("무한의 계단","🎯"),mkProject("고양이 오피스","🐱")]);
      }
      setLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((ev)=>{if(ev==="SIGNED_OUT"){setSession(null);setProjectsRaw([]);setActiveIdRaw(null);}});
    return()=>subscription.unsubscribe();
  },[]);
  const handleLogin=async(sess)=>{
    setSession(sess);
    const saved=await dbLoad(sess.uid);
    if(saved?.projects?.length>0){setProjectsRaw(saved.projects);setActiveIdRaw(saved.activeId);}
    else{const ps=[mkProject("무한의 계단","🎯"),mkProject("고양이 오피스","🐱")];setProjectsRaw(ps);dbSave(sess.uid,ps,null);}
  };
  const setProjects=upd=>setProjectsRaw(prev=>{const n=typeof upd==="function"?upd(prev):upd;if(session)dbSave(session.uid,n,activeId);return n;});
  const setActiveId=id=>{setActiveIdRaw(id);if(session)dbSave(session.uid,projects,id);};
  if(loading)return(<div style={{minHeight:"100vh",background:"#0b0f1a",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><div style={{width:36,height:36,border:"3px solid #1e2d4a",borderTopColor:"#00c8ff",borderRadius:"50%",animation:"spin .7s linear infinite"}}/><div style={{color:"#5a7a9e",fontSize:13}}>로딩 중...</div></div>);
  if(!session)return <AuthScreen onLogin={handleLogin}/>;
  return <MainDashboard _session={session} _onSignOut={async()=>sb.auth.signOut()} _exProjects={projects} _setExProjects={setProjects} _exActiveId={activeId} _setExActiveId={setActiveId} _isDark={isDark} _onToggleTheme={toggleTheme}/>;
}

const DARK_VARS={"--bg":"#0b0f1a","--nav":"#0f1625","--card":"#141d2e","--border":"#1e2d4a","--borderBright":"#2a3d5e","--accent":"#00c8ff","--accent2":"#f72585","--accent3":"#7b2fff","--success":"#06d6a0","--warn":"#ffd166","--danger":"#ef476f","--text":"#e8f0fe","--muted":"#5a7a9e","--muted2":"#3d5470"};
const LIGHT_VARS={"--bg":"#eef2f7","--nav":"#f8fafc","--card":"#ffffff","--border":"#d1d9e6","--borderBright":"#b0bdd0","--accent":"#0077b6","--accent2":"#c2185b","--accent3":"#6a0dad","--success":"#1a7a4a","--warn":"#92610a","--danger":"#b91c1c","--text":"#1a202c","--muted":"#374151","--muted2":"#6b7280"};

function applyTheme(isDark){
  const vars=isDark?DARK_VARS:LIGHT_VARS;
  Object.entries(vars).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
  document.body.style.background=vars["--bg"];
}

// C 객체 — CSS 변수 대신 현재 테마값 반환 (기존 코드 호환)
function makeC(isDark){
  const v=isDark?DARK_VARS:LIGHT_VARS;
  return{bg:v["--bg"],nav:v["--nav"],card:v["--card"],border:v["--border"],borderBright:v["--borderBright"],
    accent:v["--accent"],accent2:v["--accent2"],accent3:v["--accent3"],success:v["--success"],
    warn:v["--warn"],danger:v["--danger"],text:v["--text"],muted:v["--muted"],muted2:v["--muted2"]};
}

// ── 유틸 ─────────────────────────────────────────────────────
function getMDef(id,genre,country){
  if(id==="install")return{good:500,warn:50,unit:"건",inv:false,note:"spend÷CPI로 자동계산 또는 직접 입력"};
  const b={...BM[genre][id]};
  if(id==="cpi"){const m=CMUL[country]??1;b.good=+(b.good*m).toFixed(2);b.warn=+(b.warn*m).toFixed(2);}
  return b;
}
function getSt(def,val){
  const n=parseFloat(val);if(isNaN(n))return"neutral";
  if(def.inv)return n<=def.good?"good":n>=def.warn?"danger":"warn";
  return n>=def.good?"good":n<=def.warn?"danger":"warn";
}
const SC={good:C.success,warn:C.warn,danger:C.danger,neutral:C.muted};
function score(t,genre,country){
  let s=0;const bm=BM[genre],cd=getMDef("cpi",genre,country);
  const ctr=parseFloat(t.metrics.ctr),ipm=parseFloat(t.metrics.ipm),cpi=parseFloat(t.metrics.cpi);
  if(!isNaN(ctr))s+=Math.min(ctr/(bm.ctr.good*1.5)*40,40);
  if(!isNaN(ipm))s+=Math.min(ipm/(bm.ipm.good*1.5)*40,40);
  if(!isNaN(cpi))s+=Math.max(20-((cpi-cd.good)/(cd.warn-cd.good))*20,0);
  return Math.round(s);
}

// ── 반응형 훅 ────────────────────────────────────────────────
function useWidth(){
  const [w,setW]=useState(window.innerWidth);
  useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  return w;
}

// ── 공통 UI ──────────────────────────────────────────────────
const Pill=({text,color,size=10})=>(
  <span style={{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:20,padding:`2px ${size===10?8:10}px`,fontSize:size,fontWeight:700,whiteSpace:"nowrap",flexShrink:0}}>{text}</span>
);
function Dropdown({value,opts,onChange,color,ph}){
  const isOther=value&&!opts.includes(value)&&value!=="";
  const selectVal=isOther?"__other__":value||"";
  return(
    <div>
      <div style={{position:"relative",marginBottom:isOther?6:0}}>
        <select value={selectVal} onChange={e=>{if(e.target.value==="__other__")onChange("__other__");else onChange(e.target.value);}}
          style={{width:"100%",background:(value&&!isOther)?color+"18":C.bg,border:`1px solid ${(value&&!isOther)?color+"66":C.border}`,borderRadius:8,color:(value&&!isOther)?color:C.muted,fontSize:12,fontWeight:(value&&!isOther)?700:400,padding:"8px 28px 8px 12px",outline:"none",cursor:"pointer",fontFamily:"inherit",appearance:"none"}}>
          <option value="">{ph||"선택"}</option>
          {opts.map(o=><option key={o} value={o}>{o}</option>)}
          <option value="__other__">✏️ 기타 (직접 입력)</option>
        </select>
        <span style={{position:"absolute",right:9,top:"50%",transform:"translateY(-50%)",color:C.muted,fontSize:10,pointerEvents:"none"}}>▾</span>
      </div>
      {(isOther||value==="__other__")&&(
        <input value={isOther?value:""} onChange={e=>onChange(e.target.value)}
          placeholder="직접 입력..."
          autoFocus
          style={{width:"100%",background:color+"14",border:`1px solid ${color}66`,borderRadius:7,color:color,fontSize:11,fontWeight:600,padding:"7px 10px",outline:"none",fontFamily:"inherit"}}/>
      )}
    </div>
  );
}

// ── 프로젝트 드롭다운 (스크린샷 스타일 — 전체 오버레이) ──────
function ProjectDropdown({projects,activeId,onSelect,onCreate,onDelete}){
  const [open,setOpen]=useState(false);
  const ref=useRef();
  const btnRef=useRef();
  const [pos,setPos]=useState({top:0,left:0});
  useEffect(()=>{
    if(!open)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target)&&!btnRef.current?.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[open]);
  const toggle=()=>{
    if(!open&&btnRef.current){
      const r=btnRef.current.getBoundingClientRect();
      setPos({top:r.bottom+6,left:r.left});
    }
    setOpen(!open);
  };
  const active=projects.find(p=>p.id===activeId);
  return(
    <>
      <button ref={btnRef} onClick={toggle} style={{display:"flex",alignItems:"center",gap:7,background:"transparent",border:`1px solid ${open?C.accent:C.border}`,borderRadius:10,padding:"6px 12px",cursor:"pointer",color:C.text,fontSize:14,fontWeight:800,fontFamily:"inherit",transition:"all .15s",flexShrink:0}}>
        <div style={{width:24,height:24,borderRadius:6,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <IconDisplay value={active?.icon} size={24} borderRadius={6}/>
        </div>
        <span style={{maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{active?.name}</span>
        <span style={{color:open?C.accent:C.muted,fontSize:11,marginLeft:2}}>▾</span>
      </button>
      {open&&(
        <div ref={ref} style={{position:"fixed",top:pos.top,left:pos.left,width:280,background:"#0f1829",border:`2px solid ${C.accent}55`,borderRadius:16,zIndex:9999,boxShadow:"0 24px 64px #00000099",overflow:"hidden"}}>
          <div style={{padding:"12px 16px 8px",borderBottom:`1px solid ${C.border}`,fontSize:10,color:C.muted,fontWeight:700,letterSpacing:1.5}}>프로젝트 목록</div>
          <div style={{maxHeight:320,overflowY:"auto"}}>
            {projects.map(p=>(
              <div key={p.id} onClick={()=>{onSelect(p.id);setOpen(false);}}
                style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:p.id===activeId?C.accent+"18":"transparent",cursor:"pointer",borderBottom:`1px solid ${C.border}22`,transition:"background .1s"}}
                onMouseEnter={e=>e.currentTarget.style.background=p.id===activeId?C.accent+"28":C.card}
                onMouseLeave={e=>e.currentTarget.style.background=p.id===activeId?C.accent+"18":"transparent"}>
                <div style={{width:32,height:32,borderRadius:8,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,background:C.card}}>
                  <IconDisplay value={p.icon} size={32} borderRadius={8}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:800,color:p.id===activeId?C.accent:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>소재 {p.tests.length}개</div>
                </div>
                {p.id===activeId&&<span style={{fontSize:14,color:C.accent}}>✓</span>}
                {projects.length>1&&<span onClick={e=>{e.stopPropagation();onDelete(p.id);setOpen(false);}}
                  style={{fontSize:16,color:C.muted,cursor:"pointer",padding:"2px 6px",borderRadius:6,transition:"all .1s"}}
                  onMouseEnter={e=>e.currentTarget.style.color=C.danger}
                  onMouseLeave={e=>e.currentTarget.style.color=C.muted}>×</span>}
              </div>
            ))}
          </div>
          <div style={{padding:10,borderTop:`1px solid ${C.border}`}}>
            <button onClick={()=>{onCreate();setOpen(false);}} style={{width:"100%",padding:"10px",background:C.accent+"18",border:`1px solid ${C.accent}33`,borderRadius:10,color:C.accent,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
              + 새 프로젝트
            </button>
          </div>
        </div>
      )}
    </>
  );
}

// 아이콘이 이미지 URL인지 이모지인지 판별
const isImgIcon=v=>v&&(v.startsWith("data:")||v.startsWith("http"));
function IconDisplay({value,size=32,borderRadius=8}){
  if(isImgIcon(value))return <img src={value} style={{width:size,height:size,borderRadius,objectFit:"cover",flexShrink:0}}/>;
  return <span style={{fontSize:size*.6,lineHeight:1,flexShrink:0}}>{value||"🎯"}</span>;
}

// ── 설정 모달 ────────────────────────────────────────────────
function SettingsModal({proj,onUpdate,onClose}){
  const [name,setName]=useState(proj.name);
  const [icon,setIcon]=useState(proj.icon);
  const fileRef=useRef();

  const save=()=>{onUpdate({...proj,name:name||proj.name,icon});onClose();};

  const handleFile=e=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>setIcon(ev.target.result);
    reader.readAsDataURL(file);
  };

  return(
    <div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{position:"absolute",inset:0,background:"#00000088",backdropFilter:"blur(4px)"}}/>
      <div style={{position:"relative",background:"#0f1829",border:`1px solid ${C.border}`,borderRadius:20,padding:28,width:"min(500px,92vw)",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 32px 80px #00000099",zIndex:1}}>

        {/* 헤더 */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <div>
            <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:2,marginBottom:3}}>SETTINGS</div>
            <div style={{fontSize:18,fontWeight:900,color:C.text}}>프로젝트 설정</div>
          </div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:8,background:C.card,border:`1px solid ${C.border}`,color:C.muted,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>

        {/* 미리보기 */}
        <div style={{background:C.card,borderRadius:12,padding:"14px 18px",marginBottom:20,display:"flex",alignItems:"center",gap:14,border:`1px solid ${C.border}`}}>
          <div style={{width:48,height:48,borderRadius:12,background:C.bg,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}}>
            <IconDisplay value={icon} size={48} borderRadius={12}/>
          </div>
          <div>
            <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:3}}>미리보기</div>
            <div style={{fontSize:16,fontWeight:800,color:C.text}}>{name||"프로젝트명"}</div>
          </div>
        </div>

        {/* 프로젝트명 */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:1,marginBottom:8}}>프로젝트명</div>
          <input value={name} onChange={e=>setName(e.target.value)}
            style={{width:"100%",background:C.bg,border:`1px solid ${C.borderBright}`,borderRadius:10,color:C.text,fontSize:15,fontWeight:700,padding:"11px 14px",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
        </div>

        {/* 이미지 업로드 */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:1,marginBottom:8}}>📎 내 이미지로 아이콘 설정</div>
          <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
          <button onClick={()=>fileRef.current?.click()}
            style={{width:"100%",padding:"11px",background:C.card,border:`2px dashed ${C.borderBright}`,borderRadius:10,color:C.muted,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.color=C.accent;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.borderBright;e.currentTarget.style.color=C.muted;}}>
            {isImgIcon(icon)
              ? <><img src={icon} style={{width:22,height:22,borderRadius:5,objectFit:"cover"}}/> 이미지 변경</>
              : <>🖼 이미지 파일 업로드 (PNG · JPG · GIF)</>
            }
          </button>
          {isImgIcon(icon)&&(
            <button onClick={()=>setIcon("🎯")} style={{marginTop:6,width:"100%",padding:"7px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
              × 이미지 제거하고 이모지로 돌아가기
            </button>
          )}
        </div>

        {/* 이모지 아이콘 그리드 */}
        <div style={{marginBottom:24}}>
          <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:1,marginBottom:10}}>이모지 아이콘</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:6}}>
            {APP_ICONS.map(ic=>{
              const selected=ic===icon&&!isImgIcon(icon);
              return(
                <button key={ic} onClick={()=>setIcon(ic)}
                  style={{aspectRatio:"1",borderRadius:10,background:selected?C.accent+"22":"transparent",border:`2px solid ${selected?C.accent:C.border}`,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .1s",padding:0}}
                  onMouseEnter={e=>{if(!selected)e.currentTarget.style.background=C.card;}}
                  onMouseLeave={e=>{if(!selected)e.currentTarget.style.background="transparent";}}>
                  {ic}
                </button>
              );
            })}
          </div>
        </div>

        {/* 저장 */}
        <button onClick={save} style={{width:"100%",padding:"13px",background:`linear-gradient(135deg,${C.accent}33,${C.accent2}22)`,border:`1px solid ${C.accent}66`,borderRadius:12,color:C.accent,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit",letterSpacing:.5}}>
          ✓ 저장
        </button>
      </div>
    </div>
  );
}

// ── 인라인 지표 입력 ─────────────────────────────────────────
function MetricInput({id,value,onChange,genre,country}){
  const def=getMDef(id,genre,country);
  const st=getSt(def,value);const col=value?SC[st]:C.muted;
  return(
    <div style={{background:C.bg,border:`1px solid ${value?SC[st]+"55":C.border}`,borderRadius:10,padding:"12px 14px",flex:1,minWidth:0,transition:"border-color .2s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <span style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:1}}>{ML[id]}</span>
        {value&&st!=="neutral"&&<span style={{fontSize:9,color:SC[st],fontWeight:700}}>{st==="good"?"✓ 양호":st==="warn"?"△ 주의":"✗ 개선"}</span>}
      </div>
      <div style={{display:"flex",alignItems:"baseline",gap:2}}>
        {id==="cpi"&&<span style={{fontSize:14,color:col,fontWeight:700}}>$</span>}
        <input type="number" value={value||""} onChange={e=>onChange(e.target.value)} placeholder="—"
          style={{background:"transparent",border:"none",outline:"none",fontSize:24,fontWeight:400,color:col,fontFamily:"inherit",width:"100%",padding:0,minWidth:0}}/>
        {id!=="cpi"&&value&&<span style={{fontSize:12,color:col,fontWeight:600}}>{MUNIT[id]}</span>}
      </div>
      <div style={{fontSize:9,color:C.muted2,marginTop:3}}>{id==="install"?"설치 수 직접 입력":(def.inv?`기준 ≤${def.good}${def.unit}`:`기준 ≥${def.good}${def.unit}`)}</div>
    </div>
  );
}

// ── 소재 카드 ────────────────────────────────────────────────

    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,marginBottom:10,overflow:"hidden"}}>
      <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",gap:10,padding:isMobile?"12px 14px":"14px 20px",cursor:"pointer",borderBottom:open?`1px solid ${C.border}`:"none",background:"transparent"}}>

          {hasMet&&<div style={{background:scCol+"22",border:`1px solid ${scCol}55`,borderRadius:8,padding:"3px 8px",fontSize:11,fontWeight:800,color:scCol,fontFamily:"inherit",flexShrink:0}}>{sc}점</div>}

              <div key={mk} style={{background:C.bg,borderRadius:10,padding:12,border:`1px solid ${mod.color}22`}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>

                  <span style={{fontSize:11,fontWeight:800,color:mod.color}}>{mod.label.toUpperCase()}</span>

                  <div style={{fontSize:9,color:C.muted,marginBottom:4,fontWeight:600}}>{mod.dropLabel}</div>
                  <Dropdown value={test.vars[mk]||""} opts={mod.opts} onChange={v=>onUpdate({...test,vars:{...test.vars,[mk]:v}})} color={mod.color} ph="유형 선택"/>

                <div>

                  <textarea value={test.custom?.[mk]||""} onChange={e=>onUpdate({...test,custom:{...(test.custom||{}),[mk]:e.target.value}})}
                    placeholder={mod.ph} style={{width:"100%",background:C.card,border:`1px solid ${mod.color}18`,borderRadius:7,color:C.text,fontSize:10,padding:"7px 9px",outline:"none",resize:"vertical",minHeight:54,boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.6}}/>

  );

// ── SVG 차트 헬퍼 ─────────────────────────────────────────
function BarSVG({data,valueKey,color,height=120,bm,isDarkMode=true}){
  if(!data||!data.length)return null;
  const vals=data.map(d=>parseFloat(d[valueKey])||0);
  const maxV=Math.max(...vals,0.01);
  const padTop=34,padBottom=26;
  const chartH=height;
  const svgH=chartH+padTop+padBottom;
  const totalW=Math.max(data.length*85,220);
  const barW=Math.min(38,Math.floor((totalW/data.length)*0.42));
  const gridC=isDarkMode?"#d1d9e6":"#64748b";
  const gridN=4;
  return(
    <svg viewBox={"0 0 "+totalW+" "+svgH} style={{width:"100%",height:svgH,display:"block"}}>
      {Array.from({length:gridN},(_,gi)=>{
        const gy=padTop+chartH/gridN*(gi+1);
        const val=(maxV*(gridN-gi)/gridN).toFixed(1);
        return(<g key={gi}>
          <line x1={0} y1={gy} x2={totalW} y2={gy} stroke={gridC} strokeWidth={0.7} strokeDasharray="4,3"/>
          <text x={2} y={gy-2} fill={gridC} fontSize={8}>{val}</text>
        </g>);
      })}
      {data.map((d,i)=>{
        const v=parseFloat(d[valueKey])||0;
        const bh=Math.max((v/maxV)*chartH,2);
        const slotW=totalW/data.length;
        const x=i*slotW+(slotW-barW)/2;
        const y=padTop+(chartH-bh);
        const mkey=valueKey==="CTR"?"ctr":valueKey==="IPM"?"ipm":"cpi";
        const def=bm?getMDef(mkey,bm.genre,bm.country):null;
        const st=def?getSt(def,v):"neutral";
        const fc=st==="good"?C.success:st==="warn"?C.warn:st==="danger"?C.danger:color;
        return(
          <g key={i}>
            <rect x={x} y={y} width={barW} height={bh} fill={fc} fillOpacity={0.85} rx={4}/>
            <text x={x+barW/2} y={y-8} textAnchor="middle" fill={fc} fontSize={11} fontWeight={600}>{v||"—"}</text>
            <text x={x+barW/2} y={svgH-4} textAnchor="middle" fill={gridC} fontSize={9}>
              {d.name?.length>7?d.name.slice(0,7)+"…":d.name}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function ScoreSVG({data,height=160,isDarkMode=true}){
  if(!data||!data.length)return null;
  const maxV=100;
  const padTop=34,padBottom=30;
  const cols=CC;
  const totalW=Math.max(data.length*90,300);
  const barW=Math.min(48,Math.floor((totalW/data.length)*0.45));
  const chartH=height;
  const svgH=chartH+padTop+padBottom;
  const gridC=isDarkMode?"#d1d9e6":"#64748b";
  const gridLines=[25,50,75,100];
  return(
    <svg viewBox={"0 0 "+totalW+" "+svgH} style={{width:"100%",height:svgH,display:"block"}}>
      {gridLines.map(lv=>{
        const gy=padTop+(chartH-(lv/maxV)*chartH);
        return(<g key={lv}>
          <line x1={0} y1={gy} x2={totalW} y2={gy} stroke={gridC} strokeWidth={0.7} strokeDasharray="4,3"/>
          <text x={2} y={gy-2} fill={gridC} fontSize={8}>{lv}</text>
        </g>);
      })}
      {data.map((d,i)=>{
        const v=d.score||0;
        const bh=Math.max((v/maxV)*chartH,2);
        const slotW=totalW/data.length;
        const x=i*slotW+(slotW-barW)/2;
        const y=padTop+(chartH-bh);
        const fc=cols[i%cols.length];
        return(
          <g key={i}>
            <defs>
              <linearGradient id={"sg"+i} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={fc} stopOpacity={0.95}/>
                <stop offset="100%" stopColor={fc} stopOpacity={0.4}/>
              </linearGradient>
            </defs>
            <rect x={x} y={y} width={barW} height={bh} fill={"url(#sg"+i+")"} rx={5}/>
            <text x={x+barW/2} y={y-10} textAnchor="middle" fill={fc} fontSize={13} fontWeight={700}>{v}</text>
            <text x={x+barW/2} y={svgH-6} textAnchor="middle" fill={gridC} fontSize={10}>
              {d.name?.length>8?d.name.slice(0,8)+"…":d.name}
            </text>
          </g>
        );
      })}
    </svg>
  );
}


function RadarSVG({data,names,height=240,isDarkMode=true}){
  if(!data||data.length<2||!names||!names.length)return null;
  const cx=210,cy=118,r=82;
  const axes=data.map(d=>d.metric);
  const n=axes.length;
  const angleStep=2*Math.PI/n;
  const gridC=isDarkMode?"#d1d9e6":"#64748b";
  const pt=(ai,val)=>{
    const a=ai*angleStep-Math.PI/2;
    const rv=(val/100)*r;
    return[cx+rv*Math.cos(a),cy+rv*Math.sin(a)];
  };
  const axPt=(ai,rv)=>{const a=ai*angleStep-Math.PI/2;return[cx+rv*Math.cos(a),cy+rv*Math.sin(a)];};
  const svgW=Math.max(cx*2+40, names.length*80+40);
  const svgH=height;
  return(
    <svg viewBox={"0 0 "+svgW+" "+svgH} style={{width:"100%",height:svgH,display:"block"}}>
      {[20,40,60,80,100].map(lv=>(
        <polygon key={lv}
          points={axes.map((_,ai)=>axPt(ai,(lv/100)*r).join(",")).join(" ")}
          fill="none" stroke={gridC} strokeWidth={lv===100?1:0.7} strokeDasharray={lv===100?"none":"3,2"}/>
      ))}
      {axes.map((_,ai)=>{
        const[x2,y2]=axPt(ai,r);
        const[lx,ly]=axPt(ai,r+32);
        const label=axes[ai];
        return(<g key={ai}>
          <line x1={cx} y1={cy} x2={x2} y2={y2} stroke={gridC} strokeWidth={0.8}/>
          <text x={lx} y={ly+4} textAnchor="middle" fill={gridC} fontSize={11} fontWeight={600}>{label}</text>
        </g>);
      })}
      {names.map((name,ni)=>{
        const pts=data.map((d,ai)=>pt(ai,d[name]||0));
        const poly=pts.map(p=>p.join(",")).join(" ");
        const fc=CC[ni%CC.length];
        return(<g key={ni}>
          <polygon points={poly} fill={fc} fillOpacity={0.15} stroke={fc} strokeWidth={2}/>
          {pts.map(([px,py],ai)=>(
            <circle key={ai} cx={px} cy={py} r={3} fill={fc}/>
          ))}
        </g>);
      })}
      {/* 범례 */}
      {names.map((name,ni)=>{
        const fc=CC[ni%CC.length];
        return(<g key={ni}>
          <rect x={10+ni*110} y={svgH-18} width={12} height={10} fill={fc} rx={2}/>
          <text x={26+ni*110} y={svgH-8} fill={gridC} fontSize={10}>{name}</text>
        </g>);
      })}
    </svg>
  );
}

function GraphTab({tests,genre,country,isDark=true}){
  const w=useWidth();const isMobile=w<640;
  const active=tests.filter(t=>MID.some(id=>t.metrics[id]));
  if(!active.length)return(
    <div style={{background:C.card,border:"1px dashed "+C.border,borderRadius:14,padding:48,textAlign:"center"}}>
      <div style={{fontSize:28,marginBottom:10}}>📊</div>
      <div style={{fontSize:13,color:C.muted}}>지표 입력된 소재가 있으면 그래프가 표시됩니다.</div>
    </div>
  );

  const scoreData=active.map((t,i)=>({
    name:t.name.length>7?t.name.slice(0,7)+"…":t.name,
    fullName:t.name,score:score(t,genre,country),fill:CC[i%6]
  }));

  const barData=active.map((t,i)=>({
    name:t.name.length>7?t.name.slice(0,7)+"…":t.name,
    CTR:t.metrics.ctr||"",
    IPM:t.metrics.ipm||"",
    CPI:t.metrics.cpi||"",
    fill:CC[i%6]
  }));

  const radarData=MID.map(id=>{
    const def=getMDef(id,genre,country);
    const row={metric:ML[id]};
    active.forEach((t,i)=>{
      const v=parseFloat(t.metrics[id]);
      if(!isNaN(v)){
        let p=def.inv?Math.max(0,Math.min(100,(def.warn-v)/(def.warn-def.good)*80+20)):Math.max(0,Math.min(100,v/def.good*80));
        row[t.name.length>7?t.name.slice(0,7)+"…":t.name]=Math.round(p);
      }else{row[t.name.length>7?t.name.slice(0,7)+"…":t.name]=0;}
    });
    return row;
  });
  const shortNames=active.map(t=>t.name.length>7?t.name.slice(0,7)+"…":t.name);

  return(
    <div>
      <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:isMobile?14:22,marginBottom:14}}>
        <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:2,marginBottom:3}}>PERFORMANCE SCORE</div>
        <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:16}}>소재별 종합 성과</div>
        <ScoreSVG data={scoreData} height={160} isDarkMode={isDark}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(3,1fr)",gap:12,marginBottom:14}}>
        {[
          {key:"CTR",label:"CTR 비교 (%)",color:C.accent,bmk:{genre,country}},
          {key:"IPM",label:"IPM 비교",color:C.accent2,bmk:{genre,country}},
          {key:"CPI",label:"CPI 비교 ($)",color:C.accent3,bmk:{genre,country}},
        ].map(({key,label,color,bmk})=>(
          <div key={key} style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:isMobile?14:16}}>
            <div style={{fontSize:11,fontWeight:800,color,marginBottom:12}}>{label}</div>
            <BarSVG data={barData} valueKey={key} color={color} height={110} bm={{...bmk,genre,country}} isDarkMode={isDark}/>
          </div>
        ))}
      </div>
      {active.length>=2&&(
        <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:isMobile?14:22}}>
          <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:2,marginBottom:3}}>RADAR</div>
          <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:16}}>지표 균형 비교 (벤치마크 대비 %)</div>
          <RadarSVG data={radarData} names={shortNames} height={240} isDarkMode={isDark}/>
        </div>
      )}
    </div>
  );
}


function buildActions(winner,loser,scored,genre,country,network){
  const bm=BM[genre];
  const cpiDef=getMDef("cpi",genre,country);

    const gap=(bm.ctr.good-wctr).toFixed(1);
    const curType=winner.vars.hook||"미설정";
    const suggest=curType==="Fail형"?"공감형 또는 호기심 유발형":curType==="성공형"?"Fail형 또는 챌린지형":"Fail형";

      title:"CTR "+wctr+"% — 목표치까지 "+gap+"% 부족",
      items:[
        "현재 훅 유형 \""+curType+"\"의 클릭 전환력이 낮습니다. → \""+suggest+"\"으로 교체 후 A/B 테스트",
        "첫 0~3초 컬러 대비를 \"비비드\" 또는 \"다크\" 계열로 강화해 엄지 멈춤 유도",
        "속도감을 \"빠름\"으로 올려 첫 프레임 충격도 높이기",
        "첫 프레임을 \"실패 장면\" 또는 \"캐릭터 표정 클로즈업\"으로 교체",
        "세로 9:16 포맷 최적화 여부 확인 — Meta Reels/Shorts 네이티브 비율로 재제작",
      ]});
  }

    acts.push({priority:"low",mod:"⚡ Hook",color:C.success,
      title:"CTR "+wctr+"% — 양호. 현재 훅 구조 유지",
      items:[
        "\""+( winner.vars.hook||"현재 유형")+"\" 훅 구조 유지하며 컬러·속도감만 미세 조정",
        "성과 좋은 훅을 베이스로 플랫폼별 포맷 파생 (정방형 1:1, 배너 등) 제작",
        "같은 훅 유형 내 배경 변경·캐릭터 교체 등 low-effort 변형 버전 2개 추가",
      ]});
  }
  if(!isNaN(wipm)&&wipm<bm.ipm.good){
    const gap=(bm.ipm.good-wipm).toFixed(1);
    const curType=winner.vars.core||"미설정";
    acts.push({priority:"high",mod:"🎮 Core Play",color:C.accent2,
      title:"IPM "+wipm+" — 목표치까지 "+gap+" 부족",
      items:[
        "현재 \""+curType+"\" 연출이 설치로 전환되지 않고 있습니다. → \"실패 반복형\" 또는 \"빠른 성공형\"으로 전환",
        "메카닉 직관성 점검 — 처음 보는 사람이 3초 안에 이게 뭔지 알 수 있어야 함",

        "실패 강도를 \"강\"으로 올려 좌절→클릭 욕구 자극",

      ]});
  }
  if(!acts.some(a=>a.priority==="high"||a.priority==="critical")){
    acts.push({priority:"scale",mod:"🚀 Scale Up",color:C.success,
      title:"전 지표 양호 — 최고 조합 기반 스케일 단계",

        "최고 소재 \""+winner.name+"\"("+score(winner,genre,country)+"점) 기반으로 "+network+" 예산 2배 증액 테스트",

        "최고 조합(훅: "+(winner.vars.hook||"—")+" / 코어: "+(winner.vars.core||"—")+" / 엔드: "+(winner.vars.endcard||"—")+")을 표준 템플릿으로 지정",

      ]});
  }
  return acts;
}

          if(mk==="core"){const def=getMDef("ipm",genre,country);if(!isNaN(wipm)&&wipm>=def.good)fbs.push({t:"good",tx:`IPM ${wipm} — "${wv}" 효과적`});else if(!isNaN(wipm)&&wipm<def.warn)fbs.push({t:"danger",tx:`IPM ${wipm} 저조 — 직관성 개선`});else if(!isNaN(wipm))fbs.push({t:"warn",tx:`IPM ${wipm} 주의 — 연출 유형 변경`});}
          if(mk==="endcard"){const def=getMDef("cpi",genre,country);if(!isNaN(wcpi)&&wcpi<=def.good)fbs.push({t:"good",tx:`CPI $${wcpi} — 스케일 가능`});else if(!isNaN(wcpi)&&wcpi>=def.warn)fbs.push({t:"danger",tx:`CPI $${wcpi} 위험 — CTA 교체`});else if(!isNaN(wcpi))fbs.push({t:"warn",tx:`CPI $${wcpi} 주의 — 타이밍 앞당기기`});}
          if(!fbs.length)fbs.push({t:"neutral",tx:"지표 입력 후 생성됩니다."});
          if(wc)fbs.push({t:"memo",tx:`연출: ${wc}`});
          const fc={good:C.success,warn:C.warn,danger:C.danger,neutral:C.muted,memo:C.accent3};
          const fi={good:"✓",warn:"△",danger:"✗",neutral:"·",memo:"📝"};
          return(<div key={mk} style={{background:C.bg,borderRadius:9,overflow:"hidden",border:`1px solid ${mod.color}22`}}>

    </div>)}

    {/* ── 다음 이터레이션 (상세) */}
    <div style={{background:C.card,border:`1px solid ${C.accent3}33`,borderRadius:14,padding:isMobile?14:22}}>

}

// ── 내보내기 탭 ───────────────────────────────────────────────
function ExportTab({tests,genre,country,network,projectName}){
  const [copied,setCopied]=useState(false);
  const scored=tests.filter(t=>MID.some(id=>t.metrics[id])).map(t=>({...t,sc:score(t,genre,country)})).sort((a,b)=>b.sc-a.sc);

  const dlCSV=()=>{
    try{
      const h=["소재명","집행비용($)","CTR(%)","IPM","CPI($)","INSTALL(건)","종합점수","훅유형","훅메모","코어유형","코어메모","엔드카드스타일","엔드카드메모","기타메모"];
      const esc=v=>"\""+String(v==null?"":v).replace(/"/g,'\"\"')+"\"";
      const rows=scored.map(t=>[t.name,t.spend||"",t.metrics.ctr||"",t.metrics.ipm||"",t.metrics.cpi||"",t.metrics.install||"",t.sc,t.vars.hook||"",t.custom?.hook||"",t.vars.core||"",t.custom?.core||"",t.vars.endcard||"",t.custom?.endcard||"",t.note||""].map(esc));
      const content=[h.map(esc),...rows].map(r=>r.join(",")).join("\r\n");
      const blob=new Blob(["\uFEFF"+content],{type:"text/csv;charset=utf-8"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;a.download=projectName+"_크리에이티브테스트.csv";
      a.style.display="none";document.body.appendChild(a);a.click();
      setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},300);
    }catch(err){alert("다운로드 오류: "+err.message);}
  };;

  const summary=()=>{
    const w=scored[0],l=scored[scored.length-1];
    const sep="━".repeat(40);
    let t="";
    t+="📊 ["+projectName+"] UA 크리에이티브 분석 리포트\n";
    t+="기준: "+BM[genre].label+" · "+network+" · "+country+"\n";
    t+=sep+"\n\n";

    // 종합 현황
    t+="📈 종합 현황\n";
    t+="• 총 소재 수: "+tests.length+"개  |  지표 입력: "+scored.length+"개\n";
    const totalSp=scored.filter(t2=>t2.spend).reduce((s,t2)=>s+parseFloat(t2.spend),0);
    if(totalSp>0){
      t+="• 총 집행 비용: $"+totalSp.toLocaleString()+"\n";
      t+="• 소재당 평균 비용: $"+(totalSp/scored.filter(t2=>t2.spend).length).toFixed(0)+"\n";
      const bestEff=scored.filter(t2=>t2.spend&&MID.some(id=>t2.metrics[id])).sort((a,b)=>(b.sc/parseFloat(b.spend))-(a.sc/parseFloat(a.spend)))[0];
      if(bestEff)t+="• 최고 효율 소재: "+bestEff.name+" ("+bestEff.sc+"점 / $"+Number(bestEff.spend).toLocaleString()+")\n";
    }
    t+="\n";

    // 성과 랭킹
    t+="🏆 성과 랭킹\n";
    scored.forEach((s,i)=>{
      const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"  "+(i+1)+".";
      t+=medal+" "+s.name+" — "+s.sc+"점";
      if(s.spend)t+=" | $"+Number(s.spend).toLocaleString();
      t+="\n";
      t+="     CTR:"+(s.metrics.ctr||"—")+"% / IPM:"+(s.metrics.ipm||"—")+" / CPI:$"+(s.metrics.cpi||"—");
      if(s.metrics.install)t+=" / INSTALL:"+(s.metrics.install)+"건";
      t+="\n";
    });
    t+="\n";

    // 우승/최하위 소재
    if(w){
      t+=sep+"\n";
      t+="🥇 우승 소재: "+w.name+" ("+w.sc+"점)\n";
      t+="• 훅: "+(w.vars.hook||"미설정")+" / 코어: "+(w.vars.core||"미설정")+" / 엔드카드: "+(w.vars.endcard||"미설정")+"\n";
      if(w.custom?.hook)t+="• 훅 메모: "+w.custom.hook+"\n";
      if(w.custom?.core)t+="• 코어 메모: "+w.custom.core+"\n";
      if(w.custom?.endcard)t+="• 엔드카드 메모: "+w.custom.endcard+"\n";
      t+="\n";
      t+="📉 최하위 소재: "+l.name+" ("+l.sc+"점)\n";
      t+="\n";
    }

    // 데이터 기반 최적 조합
    const varSc={};Object.keys(MODS).forEach(mk=>{varSc[mk]={};});
    scored.forEach(t2=>{Object.keys(MODS).forEach(mk=>{const v=t2.vars[mk];if(v){if(!varSc[mk][v])varSc[mk][v]=[];varSc[mk][v].push(t2.sc);}});});
    t+=sep+"\n";
    t+="✨ 데이터 기반 최적 조합\n";
    Object.entries(MODS).forEach(([mk,mod])=>{
      let best=null,ba=-1;
      Object.entries(varSc[mk]).forEach(([v,ss])=>{const avg=ss.reduce((a,b)=>a+b,0)/ss.length;if(avg>ba){ba=avg;best=v;}});
      t+="• "+mod.label+": "+(best||"데이터 없음")+"\n";
    });
    t+="\n";

    // 모듈별 피드백
    if(w){
      const bm=BM[genre];
      const cpiDef=getMDef("cpi",genre,country);
      t+=sep+"\n";
      t+="🎬 모듈별 제작 피드백\n";
      const wctr=parseFloat(w.metrics.ctr),wipm=parseFloat(w.metrics.ipm),wcpi=parseFloat(w.metrics.cpi);
      if(!isNaN(wctr)){
        if(wctr>=bm.ctr.good)t+="⚡ Hook — CTR "+wctr+"% 양호. \""+( w.vars.hook||"현재")+"\" 유지 권장\n";
        else t+="⚡ Hook — CTR "+wctr+"% 부족 (기준 "+bm.ctr.good+"%). 훅 유형 교체 검토\n";
      }
      if(!isNaN(wipm)){
        if(wipm>=bm.ipm.good)t+="🎮 Core — IPM "+wipm+" 양호. \""+( w.vars.core||"현재")+"\" 효과적\n";
        else t+="🎮 Core — IPM "+wipm+" 부족 (기준 "+bm.ipm.good+"). 직관성 개선 필요\n";
      }
      if(!isNaN(wcpi)){
        if(wcpi<=cpiDef.good)t+="🏁 End Card — CPI $"+wcpi+" 최적. 스케일 가능\n";
        else if(wcpi>=cpiDef.warn)t+="🏁 End Card — CPI $"+wcpi+" 위험 (기준 $"+cpiDef.warn+"). CTA 교체 필요\n";
        else t+="🏁 End Card — CPI $"+wcpi+" 주의. CTA 타이밍 조정 검토\n";
      }
      t+="\n";
    }

    t+=sep+"\n";
    t+="📅 분석일: "+new Date().toLocaleDateString("ko-KR")+"\n";
    t+="⚡ Powered by UA Creative Dashboard\n";
    return t;
  };

  const doCopy=()=>{
    const txt=summary();
    // clipboard API 우선, 실패 시 textarea fallback
    if(navigator.clipboard&&window.isSecureContext){
      navigator.clipboard.writeText(txt).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}).catch(()=>fallbackCopy(txt));
    } else { fallbackCopy(txt); }
  };
  const fallbackCopy=(txt)=>{
    const ta=document.createElement("textarea");
    ta.value=txt;ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand("copy");setCopied(true);setTimeout(()=>setCopied(false),2000);}catch(e){}
    document.body.removeChild(ta);
  };

  const isMobile=useWidth()<640;
  return(
    <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:16}}>
      {/* CSV */}
      <div style={{background:C.card,border:"1px solid "+C.success+"33",borderRadius:14,padding:24}}>
        <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:2,marginBottom:4}}>EXPORT</div>
        <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>📊 Google Sheets / CSV</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:18,lineHeight:1.6}}>모든 소재 데이터를 CSV 파일로 다운로드합니다.<br/>Google Sheets에서 파일 업로드 후 바로 열기 가능합니다.</div>
        <button onClick={dlCSV} style={{width:"100%",padding:"11px",background:C.success+"18",border:"1px solid "+C.success+"55",borderRadius:9,color:C.success,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
          ⬇ CSV 다운로드
        </button>
      </div>
      {/* 복사 */}
      <div style={{background:C.card,border:"1px solid "+C.accent3+"33",borderRadius:14,padding:24}}>
        <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:2,marginBottom:4}}>COPY</div>
        <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>📋 요약 텍스트 복사</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:18,lineHeight:1.6}}>Slack, Notion, 이메일에 바로 붙여넣기 가능한<br/>요약 텍스트를 클립보드에 복사합니다.</div>
        <button onClick={doCopy} style={{width:"100%",padding:"11px",background:C.accent3+"18",border:"1px solid "+C.accent3+"55",borderRadius:9,color:copied?C.success:C.accent3,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"color .2s"}}>
          {copied?"✓ 복사 완료!":"📋 요약 복사"}
        </button>
        {copied&&<div style={{marginTop:8,fontSize:11,color:C.success,textAlign:"center"}}>클립보드에 복사됐습니다!</div>}
      </div>
    </div>
  );
}

          {!isMobile&&<div style={{display:"flex",gap:3,flexShrink:0}}>
            {["hypercasual","hybrid"].map(g=>(
              <button key={g} onClick={()=>setGenre(g)} style={{padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:10,fontWeight:700,background:genre===g?C.accent+"22":"transparent",border:`1px solid ${genre===g?C.accent:C.border}`,color:genre===g?C.accent:C.muted,fontFamily:"inherit",whiteSpace:"nowrap"}}>
                {g==="hypercasual"?"하이퍼캐주얼":"하이브리드"}
              </button>
            ))}
          </div>}
          {!isTablet&&<>
            <select value={network} onChange={e=>setNetwork(e.target.value)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,fontSize:10,padding:"4px 8px",outline:"none",cursor:"pointer",fontFamily:"inherit",appearance:"none",flexShrink:0}}>
              {NETS.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
            <select value={country} onChange={e=>setCountry(e.target.value)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,fontSize:10,padding:"4px 8px",outline:"none",cursor:"pointer",fontFamily:"inherit",appearance:"none",flexShrink:0}}>
              {CTRS.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </>}
          <div style={{flex:1}}/>
          {/* 환영 메시지 */}
          {_session&&!isMobile&&(
            <div style={{display:"flex",alignItems:"center",gap:6,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"5px 14px",flexShrink:0}}>
              <span style={{fontSize:11,color:C.muted,fontWeight:600}}>Welcome!</span>
              <span style={{fontSize:12,fontWeight:800,color:C.text}}>{_session.name}님</span>
              <span style={{fontSize:14}}>👋</span>
            </div>
          )}
          <ThemeToggle isDark={_isDark!==undefined?_isDark:true} onToggle={_onToggleTheme||(() => {})}/>
          <Pill text={`${tests.length}개`} color={C.accent2}/>
          {/* ⚙️ 설정 버튼 */}
          <button onClick={()=>setSettingsOpen(true)} title="프로젝트 설정"
            style={{width:34,height:34,borderRadius:9,background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontSize:17,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.background=C.card;e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.color=C.accent;}}
            onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted;}}>
            ⚙️
          </button>
          {_session&&<UserMenu session={_session} onSignOut={_onSignOut}/>}
        </div>
      </div>

      {/* 모바일 설정 바 */}
      {isMobile&&(
        <div style={{background:C.nav,borderBottom:`1px solid ${C.border}`,padding:"8px 14px",display:"flex",gap:6,flexWrap:"wrap"}}>
          {["hypercasual","hybrid"].map(g=>(
            <button key={g} onClick={()=>setGenre(g)} style={{padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:10,fontWeight:700,background:genre===g?C.accent+"22":"transparent",border:`1px solid ${genre===g?C.accent:C.border}`,color:genre===g?C.accent:C.muted,fontFamily:"inherit"}}>
              {g==="hypercasual"?"HC":"Hybrid"}
            </button>
          ))}
          <select value={network} onChange={e=>setNetwork(e.target.value)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,fontSize:10,padding:"4px 8px",outline:"none",cursor:"pointer",fontFamily:"inherit",appearance:"none"}}>
            {NETS.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
          <select value={country} onChange={e=>setCountry(e.target.value)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,fontSize:10,padding:"4px 8px",outline:"none",cursor:"pointer",fontFamily:"inherit",appearance:"none"}}>
            {CTRS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
      )}

      <div style={{maxWidth:1080,margin:"0 auto",padding:`20px ${isMobile?12:24}px`}}>
        {/* KPI 요약 */}
        {active.length>0&&(
          <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:10,marginBottom:16}}>
            <KpiCard label="최고 성과 소재" value={topTest?topTest.name:"—"} sub={topTest?`${score(topTest,genre,country)}점`:"—"} color={C.success} icon="🥇"/>
            <KpiCard label="평균 CTR" value={avgCTR?`${avgCTR}%`:"—"} color={C.accent} icon="📈"/>
            <KpiCard label="평균 CPI" value={avgCPI?`$${avgCPI}`:"—"} color={C.accent3} icon="💰"/>
            <KpiCard label="총 집행 비용" value={totalSpend?`$${totalSpend.toLocaleString()}`:"미입력"} color={C.warn} icon="💸"/>
          </div>
        )}

        {/* 탭 */}
        {(()=>{const TABS=[{id:"tests",label:"🧪 테스트"},{id:"graph",label:"📊 그래프"},{id:"result",label:"🏆 결과"},{id:"export",label:"📤 내보내기"}];return(
        <div style={{display:"flex",gap:isMobile?3:4,marginBottom:16,background:C.nav,borderRadius:10,padding:3,border:`1px solid ${C.border}`,width:"fit-content",overflowX:"auto"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:isMobile?"7px 12px":"8px 16px",borderRadius:7,cursor:"pointer",background:tab===t.id?C.card:"transparent",border:`1px solid ${tab===t.id?C.borderBright:"transparent"}`,color:tab===t.id?C.text:C.muted,fontSize:isMobile?11:12,fontWeight:700,fontFamily:"inherit",transition:"all .15s",whiteSpace:"nowrap"}}>
              {t.label}
            </button>
          ))}
        </div>);})()}

        {tab==="tests"&&(<>
          {active.length>0&&(<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:12}}>
            <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:2,marginBottom:10}}>RANKING</div>
            {[...active].sort((a,b)=>score(b,genre,country)-score(a,genre,country)).map((t,i)=>{const s=score(t,genre,country);return(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:i<active.length-1?7:0}}>
                <span style={{fontSize:11,width:18,color:i===0?C.warn:C.muted,fontWeight:800,flexShrink:0}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`}</span>
                <span style={{fontSize:11,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</span>
                <div style={{flex:1,background:C.bg,borderRadius:3,height:5,overflow:"hidden"}}><div style={{width:`${s}%`,height:"100%",background:i===0?`linear-gradient(90deg,${C.accent},${C.accent2})`:CC[i%6]+"88",borderRadius:3}}/></div>
                <span style={{fontSize:11,fontWeight:800,color:CC[i%6],fontFamily:"inherit",width:28,textAlign:"right",flexShrink:0}}>{s}</span>
              </div>
            );})}
          </div>)}
          {tests.map((t,i)=><TestCard key={t.id} test={t} onUpdate={updTest} onDelete={delTest} genre={genre} country={country} index={i}/>)}
          <button onClick={addTest} style={{width:"100%",padding:"13px",background:"transparent",border:`2px dashed ${C.border}`,borderRadius:11,color:C.muted,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}
            onMouseEnter={e=>{e.target.style.borderColor=C.accent;e.target.style.color=C.accent;}}
            onMouseLeave={e=>{e.target.style.borderColor=C.border;e.target.style.color=C.muted;}}>
            + 소재 테스트 추가
          </button>
        </>)}
        {tab==="graph"&&<GraphTab tests={tests} genre={genre} country={country} isDark={_isDark!==false}/>}
        {tab==="result"&&<ResultTab tests={tests} genre={genre} country={country} network={network}/>}
        {tab==="export"&&<ExportTab tests={tests} genre={genre} country={country} network={network} projectName={proj.name}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
